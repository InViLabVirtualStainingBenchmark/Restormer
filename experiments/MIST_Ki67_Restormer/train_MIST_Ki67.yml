name: restormer_MIST_Ki67
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

datasets:
  train:
    name: MIST_Ki67_Train
    type: PairedImageDataset
    dataroot_gt: /home/thomas/virtual_stain/data/MIST/Ki67/TrainValAB/trainB
    dataroot_lq: /home/thomas/virtual_stain/data/MIST/Ki67/TrainValAB/trainA
    geometric_augs: true
    filename_cd repos/Restormer/experiments/MIST_ER/tmpl: '{}'
    io_backend:
      type: disk
    use_hflip: true
    use_rot: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 4
    mini_batch_sizes: [4]
    iters: [60000]
    gt_size: 64
    lq_size: 64
    gt_sizes: [64]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: MIST_Ki67_Val
    type: PairedImageDataset
    dataroot_gt: /home/thomas/virtual_stain/data/MIST/Ki67/TrainValAB/valB
    dataroot_lq: /home/thomas/virtual_stain/data/MIST/Ki67/TrainValAB/valA
    use_hflip: false
    use_rot: false
    io_backend:
      type: disk

network_g:
  type: Restormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4,6,6,8]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: BiasFree
  dual_pixel_task: False

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~
  root: /home/thomas/virtual_stain/repos/Restormer
  experiments_root: /home/thomas/virtual_stain/repos/Restormer/experiments/MIST_Ki67_Restormer
  models: /home/thomas/virtual_stain/repos/Restormer/experiments/MIST_Ki67_Restormer/models
  training_states: /home/thomas/virtual_stain/repos/Restormer/experiments/MIST_Ki67_Restormer/training_states
  log: /home/thomas/virtual_stain/repos/Restormer/experiments/MIST_Ki67_Restormer/logs
  visualization: /home/thomas/virtual_stain/repos/Restormer/experiments/MIST_Ki67_Restormer/visualization

train:
  total_iter: 1000
  warmup_iter: -1
  use_grad_clip: true
  mixing_augs:
    mixup: false
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [30000, 30000]
    restart_weights: [1, 1]
    eta_mins: [0.0002, 0.000001]
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  val_freq: !!float 5e3
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~

dist_params:
  backend: nccl
  port: 29500
