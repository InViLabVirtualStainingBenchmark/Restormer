# CMD:
# basicsr/train.py -opt /code/Restormer/experiments/MIST_ER_Restormer/train_MIST_ER.yml --auto_resume

name: restormer_MIST_ER
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

datasets:
  train:
    name: MIST_ER_Train
    type: PairedImageDataset
    dataroot_gt: /data/train_IHC
    dataroot_lq: /data/train_HE
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk
    use_hflip: true
    use_rot: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 2
    mini_batch_sizes: [2]
    iters: [50000]
    gt_size: 256
    lq_size: 256
    gt_sizes: [256]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~
  val:
    name: MIST_ER_Val
    type: PairedImageDataset
    dataroot_gt: /data/val_IHC
    dataroot_lq: /data/val_HE
    use_hflip: false
    use_rot: false
    io_backend:
      type: disk

network_g:
  type: Restormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4,6,6,8]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: BiasFree
  dual_pixel_task: False

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~
  experiments_root: /output
  models: /output/models
  training_states: /output/training_states
  log: /output/logs
  visualization: /output/visualization

train:
  total_iter: 50000
  warmup_iter: -1
  use_grad_clip: true
  mixing_augs:
    mixup: false
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [25000, 25000]
    restart_weights: [1, 1]
    eta_mins: [0.0002, 0.000001]
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  val_freq: 1000
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 100
  save_checkpoint_freq: 50000
  use_tb_logger: true
  wandb:
    project: ~

dist_params:
  backend: nccl
  port: 29500