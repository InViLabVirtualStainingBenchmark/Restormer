name: restormer_BCI
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

datasets:
  test:
    name: BCI_Test
    type: PairedImageDataset
    dataroot_gt: ../../data/BCI/IHC/test
    dataroot_lq: ../../data/BCI/HE/test
    use_hflip: false
    use_rot: false
    io_backend:
      type: disk

network_g:
  type: Restormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4,6,6,8]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: BiasFree
  dual_pixel_task: False

path:
  pretrain_network_g: /home/thomas/virtual_stain/repos/Restormer/experiments/BCI_Restormer/models/net_g_latest.pth
  strict_load_g: true
  resume_state: ~
  root: /home/thomas/virtual_stain/repos/Restormer
  experiments_root: /home/thomas/virtual_stain/repos/Restormer/experiments/BCI_Restormer
  models: /home/thomas/virtual_stain/repos/Restormer/experiments/BCI_Restormer/models
  training_states: /home/thomas/virtual_stain/repos/Restormer/experiments/BCI_Restormer/training_states
  log: /home/thomas/virtual_stain/repos/Restormer/experiments/BCI_Restormer/logs
  visualization: /home/thomas/virtual_stain/repos/Restormer/experiments/BCI_Restormer/visualization

val:
  save_img: true
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

dist_params:
  backend: nccl
  port: 29500
