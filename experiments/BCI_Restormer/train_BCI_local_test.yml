name: restormer_BCI_local_test
model_type: ImageCleanModel
scale: 1
num_gpu: 0
manual_seed: 100

datasets:
  train:
    name: BCI_Train
    type: PairedImageDataset
    dataroot_gt: C:/Users/edobo/IdeaProjects/Restormer/datasets/BCI/test_IHC
    dataroot_lq: C:/Users/edobo/IdeaProjects/Restormer/datasets/BCI/test_HE
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk
    use_hflip: true
    use_rot: true
    num_worker_per_gpu: 0
    batch_size_per_gpu: 1
    mini_batch_sizes: [1]
    iters: [5]
    gt_size: 64
    lq_size: 64
    gt_sizes: [64]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~
  val:
    name: BCI_Val
    type: PairedImageDataset
    dataroot_gt: C:/Users/edobo/IdeaProjects/Restormer/datasets/BCI/test_IHC
    dataroot_lq: C:/Users/edobo/IdeaProjects/Restormer/datasets/BCI/test_HE
    use_hflip: false
    use_rot: false
    io_backend:
      type: disk

network_g:
  type: Restormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4,6,6,8]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: BiasFree
  dual_pixel_task: False

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~
  experiments_root: C:/Users/edobo/IdeaProjects/Restormer/experiments/BCI_Restormer_local
  models: C:/Users/edobo/IdeaProjects/Restormer/experiments/BCI_Restormer_local/models
  training_states: C:/Users/edobo/IdeaProjects/Restormer/experiments/BCI_Restormer_local/training_states
  log: C:/Users/edobo/IdeaProjects/Restormer/experiments/BCI_Restormer_local/logs
  visualization: C:/Users/edobo/IdeaProjects/Restormer/experiments/BCI_Restormer_local/visualization

train:
  total_iter: 5
  warmup_iter: -1
  use_grad_clip: true
  mixing_augs:
    mixup: false
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [3, 2]
    restart_weights: [1, 1]
    eta_mins: [0.0002, 0.000001]
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  val_freq: 5
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 1
  save_checkpoint_freq: 5
  use_tb_logger: false
  wandb:
    project: ~

dist_params:
  backend: gloo
  port: 29500